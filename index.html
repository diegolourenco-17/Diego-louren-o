<title>Diego de Jesus</title>

<style>

/* RESET */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* IMAGEM DE FUNDO (AGORA É TUDO) */
.fundo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ÍCONES */
.icons {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
}

/* ÍCONES INDIVIDUAIS */
.icons img {
  width: 85px;
  animation: pulse 2s infinite;
  filter: drop-shadow(0 0 6px gold);
  transition: 0.3s;
}

/* TOQUE */
.icons img:active {
  transform: scale(1.2);
}

/* ANIMAÇÃO */
@keyframes pulse {
  0% {
    transform: scale(1);
    filter: drop-shadow(0 0 4px gold);
  }
  50% {
    transform: scale(1.1);
    filter: drop-shadow(0 0 14px gold);
  }
  100% {
    transform: scale(1);
    filter: drop-shadow(0 0 4px gold);
  }
}

</style>
</head>
