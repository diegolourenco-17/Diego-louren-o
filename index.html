<title>Diego de Jesus</title>

<style>

/* FUNDO */
body {
  margin: 0;
  background: #b8860b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* CARTÃO */
.card {
  width: 320px;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* IMAGEM DO CARTÃO */
.card img {
  width: 100%;
  display: block;
  border-radius: 30px;
}

/* ÍCONES */
.icons {
  position: absolute;
  bottom: 25px;
  width: 100%;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
}

/* ÍCONES INDIVIDUAIS */
.icons img {
  width: 85px;
  animation: pulse 2s infinite;
  filter: drop-shadow(0 0 6px gold);
  transition: 0.3s;
}

/* AO TOCAR */
.icons img:active {
  transform: scale(1.2);
}

/* ANIMAÇÃO PULSAR */
@keyframes pulse {
  0% {
    transform: scale(1);
    filter: drop-shadow(0 0 4px gold);
  }
  50% {
    transform: scale(1.08);
    filter: drop-shadow(0 0 12px gold);
  }
  100% {
    transform: scale(1);
    filter: drop-shadow(0 0 4px gold);
  }
}

</style>
</head>

<body>

<!-- CARTÃO -->

</div>
